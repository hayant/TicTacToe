# Build, test, containerize and deploy the TicTacToe (Gomoku) app.
#
# Required configuration for the deploy job (GitHub repo settings):
#   Secrets:   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#              (an Entra ID app registration with a federated credential for this repo)
#   Variables: DEPLOY_ENABLED=true, AZURE_RESOURCE_GROUP, AZURE_CONTAINER_APP
# The deploy job is skipped unless DEPLOY_ENABLED is "true", so the pipeline stays
# green even when no Azure environment is configured.

name: Build, containerize and deploy - TicTacToe

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Frontend
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: TicTacToe/scripts/package-lock.json

      - name: Install frontend dependencies
        working-directory: TicTacToe/scripts
        run: npm ci

      - name: Build frontend with Webpack
        working-directory: TicTacToe/scripts
        run: npm run build

      # Backend
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build with dotnet
        run: dotnet build --configuration Release --no-restore

      - name: Test with dotnet
        run: dotnet test --configuration Release --no-build --verbosity normal

  docker:
    needs: build-test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.img.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            BUILD_NUMBER=${{ github.run_number }}
            GIT_SHA=${{ github.sha }}
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}

  deploy:
    needs: docker
    if: ${{ github.event_name != 'pull_request' && vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC federated login
      contents: read
    steps:
      - name: Azure login (OIDC, no long-lived secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy image to Azure Container Apps
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name "${{ vars.AZURE_CONTAINER_APP }}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --image "${{ needs.docker.outputs.image }}:${{ github.sha }}"
